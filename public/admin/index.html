<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Augenblick · 内容管理</title>
    <style>
      .cms-conditional-hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      (function () {
        const typeLabels = {
          film: '电影',
          tv: '剧集',
          music: '音乐单曲',
          album: '专辑',
          book: '书',
        };

        const conditionalFields = {
          screenwriter: { label: '编剧（影视，可选）', types: ['film', 'tv'] },
          leadActor: { label: '男主（影视，可选）', types: ['film', 'tv'] },
          leadActress: { label: '女主（影视，可选）', types: ['film', 'tv'] },
          cast: { label: '其他演员 / 卡司（影视，可选）', types: ['film', 'tv'] },
          translator: { label: '译者（书籍，可选）', types: ['book'] },
          lyricist: { label: '作词（音乐，可选）', types: ['music', 'album'] },
          composer: { label: '作曲（音乐，可选）', types: ['music', 'album'] },
          arranger: { label: '编曲（音乐，可选）', types: ['music', 'album'] },
        };

        function normalizeText(value) {
          return (value || '').replace(/\s+/g, ' ').trim();
        }

        function getVisibleText(element) {
          return normalizeText(element?.textContent || '');
        }

        function findFieldContainerByLabel(labelText) {
          const target = normalizeText(labelText);
          const candidates = Array.from(document.querySelectorAll('label, legend, span, div, p, strong'));

          for (const candidate of candidates) {
            if (getVisibleText(candidate) !== target) continue;

            let current = candidate;
            while (current && current !== document.body) {
              if (current.querySelector('input, textarea, select, [role="combobox"], [contenteditable="true"]')) {
                return current;
              }
              current = current.parentElement;
            }
          }

          return null;
        }

        function getTypeValue() {
          const directInput =
            document.querySelector('input[name="type"][value]') ||
            document.querySelector('select[name="type"]');

          if (directInput && directInput.value && typeLabels[directInput.value]) {
            return directInput.value;
          }

          const typeContainer = findFieldContainerByLabel('类型');
          const typeText = getVisibleText(typeContainer);

          for (const [value, label] of Object.entries(typeLabels)) {
            if (typeText.includes(label)) return value;
          }

          return null;
        }

        function updateConditionalFields() {
          const currentType = getTypeValue();

          Object.values(conditionalFields).forEach(({ label, types }) => {
            const container = findFieldContainerByLabel(label);
            if (!container) return;

            const shouldShow = currentType ? types.includes(currentType) : false;
            container.classList.toggle('cms-conditional-hidden', !shouldShow);
          });
        }

        function initConditionalFields() {
          updateConditionalFields();

          const observer = new MutationObserver(() => {
            window.requestAnimationFrame(updateConditionalFields);
          });

          observer.observe(document.body, {
            childList: true,
            subtree: true,
            attributes: true,
            characterData: true,
          });

          document.body.addEventListener('change', () => {
            window.requestAnimationFrame(updateConditionalFields);
          });

          document.body.addEventListener('click', () => {
            window.requestAnimationFrame(updateConditionalFields);
          });
        }

        window.addEventListener('load', initConditionalFields);
      })();
    </script>
  </body>
</html>
