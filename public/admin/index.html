<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Augenblick · 内容管理</title>
    <style>
      .cms-conditional-hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      (function () {
        const conditionalFields = {
          screenwriter: ['film', 'tv'],
          leadActor: ['film', 'tv'],
          leadActress: ['film', 'tv'],
          cast: ['film', 'tv'],
          translator: ['book'],
          lyricist: ['music', 'album'],
          composer: ['music', 'album'],
          arranger: ['music', 'album'],
        };

        const typeLabels = {
          film: '电影',
          tv: '剧集',
          music: '音乐单曲',
          album: '专辑',
          book: '书',
        };

        function normalizeText(value) {
          return (value || '').replace(/\s+/g, ' ').trim();
        }

        function findFieldLabel(fieldName) {
          return document.querySelector(`label[for^="${fieldName}-field-"]`);
        }

        function findFieldContainer(fieldName) {
          const label = findFieldLabel(fieldName);
          return label ? label.closest('div[aria-label]') : null;
        }

        function getTypeValue() {
          const typeContainer = findFieldContainer('type');
          const typeText = normalizeText(typeContainer?.textContent || '');

          for (const [value, label] of Object.entries(typeLabels)) {
            if (typeText.includes(label)) return value;
          }

          return null;
        }

        function updateConditionalFields() {
          const currentType = getTypeValue();

          Object.entries(conditionalFields).forEach(([fieldName, types]) => {
            const container = findFieldContainer(fieldName);
            if (!container) return;

            const shouldShow = currentType ? types.includes(currentType) : false;
            container.classList.toggle('cms-conditional-hidden', !shouldShow);
          });
        }

        function initConditionalFields() {
          updateConditionalFields();

          const observer = new MutationObserver(() => {
            window.requestAnimationFrame(updateConditionalFields);
          });

          observer.observe(document.body, {
            childList: true,
            subtree: true,
            attributes: true,
            characterData: true,
          });

          document.body.addEventListener('change', () => {
            window.requestAnimationFrame(updateConditionalFields);
          });

          document.body.addEventListener('click', () => {
            window.requestAnimationFrame(updateConditionalFields);
          });

          document.body.addEventListener('input', () => {
            window.requestAnimationFrame(updateConditionalFields);
          });
        }

        window.addEventListener('load', initConditionalFields);
      })();
    </script>
  </body>
</html>
