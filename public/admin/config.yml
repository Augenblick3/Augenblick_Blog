backend:
  name: git-gateway
  branch: main

# Netlify Identity widget
local_backend: false

media_folder: "public/uploads"
public_folder: "/uploads"

locale: zh

collections:
  # ── 媒介：影视 / 音乐 / 文学 ───────────────────────────────
  - name: "media"
    label: "媒介"
    label_singular: "媒介条目"
    folder: "src/content/media"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - label: "类型"
        name: "type"
        widget: "select"
        options:
          - { label: "电影", value: "film" }
          - { label: "剧集", value: "tv" }
          - { label: "音乐单曲", value: "music" }
          - { label: "专辑", value: "album" }
          - { label: "书", value: "book" }
      - { label: "主要创作者（导演 / 演唱者 / 作者）", name: "creator", widget: "string", required: false }
      - { label: "作品年份", name: "yearCreated", widget: "number", required: false }
      - label: "开始日期 / 单日日期"
        name: "dateConsumed"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: "如果只在某一天看完/读完/听完，只填这一项。"
      - label: "结束日期（可选）"
        name: "dateConsumedEnd"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false
        hint: "如果这是一个持续一段时间的过程，再填写结束日期。"
      - label: "评分（1–5星）"
        name: "rating"
        widget: "select"
        required: false
        options:
          - { label: "★★★★★", value: 5 }
          - { label: "★★★★☆", value: 4 }
          - { label: "★★★☆☆", value: 3 }
          - { label: "★★☆☆☆", value: 2 }
          - { label: "★☆☆☆☆", value: 1 }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }

      - { label: "编剧（影视，可选）", name: "screenwriter", widget: "string", required: false }
      - { label: "男主（影视，可选）", name: "leadActor", widget: "string", required: false }
      - { label: "女主（影视，可选）", name: "leadActress", widget: "string", required: false }
      - label: "其他演员 / 卡司（影视，可选）"
        name: "cast"
        widget: "list"
        required: false
        hint: "每行一位，格式建议：演员名（角色名），如 Greta Lee（Nora）"

      - { label: "译者（书籍，可选）", name: "translator", widget: "string", required: false }

      - { label: "作词（音乐，可选）", name: "lyricist", widget: "string", required: false }
      - { label: "作曲（音乐，可选）", name: "composer", widget: "string", required: false }
      - { label: "编曲（音乐，可选）", name: "arranger", widget: "string", required: false }

      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - label: "正文（影评 / 歌评 / 读书笔记）"
        name: "body"
        widget: "markdown"
        hint: "书籍请用 ## 章节名 · 日期 分隔不同时段的感想。引用台词/歌词可用 > 引号块，或在 MDX 中使用 <PullQuote> 组件。"

  # ── 科研 ────────────────────────────────────────────────────
  - name: "research"
    label: "科研"
    label_singular: "科研文章"
    folder: "src/content/research"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - label: "类型"
        name: "type"
        widget: "select"
        options:
          - { label: "项目简介 / Project", value: "project" }
          - { label: "读文笔记 / Paper", value: "paper-note" }
          - { label: "技术博文 / Technical", value: "technical" }
          - { label: "周报 / Weekly", value: "weekly" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - { label: "正文（支持 LaTeX 公式和代码块）", name: "body", widget: "markdown" }

  # ── 随想 ────────────────────────────────────────────────────
  - name: "musings"
    label: "随想"
    label_singular: "随想文章"
    folder: "src/content/musings"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - { label: "正文", name: "body", widget: "markdown" }

  # ── 健身 ────────────────────────────────────────────────────
  - name: "fitness"
    label: "健身"
    label_singular: "训练日志"
    folder: "src/content/fitness"
    create: true
    slug: "{{year}}-{{month}}-{{day}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "休息日（开启后不计入训练天数）", name: "isRestDay", widget: "boolean", default: false }
      - { label: "一句话概括（如：跑步 5km · 深蹲 3×10）", name: "summary", widget: "string", required: false }
      - { label: "总时长（分钟）", name: "totalMinutes", widget: "number", required: false }
      - label: "当日状态"
        name: "mood"
        widget: "select"
        required: false
        options:
          - { label: "🔥 状态极佳", value: "great" }
          - { label: "✓ 不错", value: "good" }
          - { label: "○ 一般", value: "okay" }
          - { label: "… 疲惫", value: "tired" }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - label: "详细记录"
        name: "body"
        widget: "markdown"
        hint: "可以用列表记录每个项目，如：- 跑步 5km · 配速 6:00/km"
